server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;
  auth_basic "Nimbus Hub";
  auth_basic_user_file /etc/nginx/.htpasswd;

  add_header Cache-Control "no-store" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # 共享扫描摘要（只读）
  location = /shared_meta.json {
    alias /shared/shared_meta.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /shared_nodes.json {
    alias /shared/shared_nodes.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /shared_proxies.json {
    alias /shared/shared_proxies.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /shared_proxies_meta.json {
    alias /shared/shared_proxies_meta.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  # 扫描器 API（触发扫描/查看扫描状态）
  location ~ ^/api/scanner/(?<api_path>.*)$ {
    set $upstream nimbus-scanner:8787;
    proxy_set_header X-Nimbus-Hub-Token nimbus-hub-internal;
    proxy_pass http://$upstream/EJsW2EeBo9lY/api/$api_path$is_args$args;
  }

  # 区域 worker API
  location ~ ^/api/(?<region>jp|us|kr|ru|vn|other)/(?<api_path>.*)$ {
    set $upstream nimbus-$region:8787;
    proxy_set_header X-Nimbus-Hub-Token nimbus-hub-internal;
    proxy_pass http://$upstream/EJsW2EeBo9lY/api/$api_path$is_args$args;
  }
}
